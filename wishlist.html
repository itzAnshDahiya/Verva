<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VERVA Wishlist – your saved products." />
  <title>Wishlist – Verva</title>
  <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

<header id="site-header">
  <a href="index.html" class="header-logo">VERVA<span class="dot">.</span></a>
  <nav class="header-nav">
    <a href="index.html">Home</a><a href="shop.html">Shop</a><a href="about.html">About</a><a href="support.html">Support</a>
  </nav>
  <div class="header-actions">
    <button id="theme-toggle"></button>
    <button class="hdr-icon" id="cart-btn"><i class="fas fa-bag-shopping"></i><span class="badge cart-count-badge">0</span></button>
    <a href="login.html" class="hdr-icon" id="header-avatar-btn"><i class="fas fa-circle-user"></i></a>
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
</header>
<nav class="mobile-nav" id="mobile-nav"><a href="index.html">Home</a><a href="shop.html">Shop</a></nav>

<div class="wishlist-layout">
  <div class="section-label anim-fade">Saved</div>
  <h1 class="anim-fade" style="margin-bottom:.5rem;">My Wishlist</h1>
  <p class="anim-fade" style="margin-bottom:2rem;">Items you've saved for later.</p>

  <div id="wishlist-grid" class="wishlist-grid">
    <!-- Rendered by JS -->
    <div style="text-align:center;padding:4rem;color:var(--text-muted);grid-column:1/-1;">
      <i class="far fa-heart" style="font-size:4rem;opacity:.2;margin-bottom:1.5rem;display:block;"></i>
      <h3>Your wishlist is empty</h3>
      <p style="margin:1rem 0 2rem;">Browse the shop and hit the ♥ button on any product.</p>
      <a href="shop.html" class="btn btn-primary">Browse Shop</a>
    </div>
  </div>
</div>

<aside id="mini-cart" role="dialog">
  <div class="mini-cart-header"><h3>Cart <span id="mini-cart-count"></span></h3><button class="hdr-icon" id="cart-close"><i class="fas fa-xmark"></i></button></div>
  <div class="mini-cart-body" id="mini-cart-body"></div>
  <div class="mini-cart-footer">
    <div class="cart-total-row"><span>Total</span><span id="mini-cart-total">₹0</span></div>
    <a href="checkout.html" class="btn btn-primary btn-block mb-2">Checkout</a>
  </div>
</aside>
<div class="cart-overlay" id="cart-overlay"></div>
<div id="toast-container"></div>

<footer id="site-footer" style="margin-top:5rem;">
  <div class="footer-inner"><div class="footer-bottom"><p>© 2026 Verva Technologies Pvt. Ltd.</p></div></div>
</footer>

<script src="js/main.js"></script>
<script src="js/cart.js"></script>
<script src="js/product.js"></script>
<script>
// Static product catalog for wishlist lookup
const CATALOG = [
  { id:'1', name:'VERVA Bedroom', price:24999, image:'assets/img/bedroom_purifier.png', variant:'Standard', rating:'4.9' },
  { id:'2', name:'VERVA Office',  price:34999, image:'assets/img/office_purifier.png', variant:'Standard', rating:'4.8' },
  { id:'3', name:'VERVA Pro',     price:49999, image:'assets/img/pro_purifier.png', variant:'Standard', rating:'4.9' },
  { id:'4', name:'VERVA Mini',    price:14999, image:'assets/img/hero_purifier.png', variant:'Standard', rating:'4.7' },
  { id:'5', name:'VERVA Max',     price:64999, image:'assets/img/lifestyle_section.png', variant:'Standard', rating:'4.8' },
  { id:'f1',name:'HEPA Filter Pack', price:4999, image:'assets/img/hero_purifier.png', variant:'3-Pack', rating:'4.9' },
  { id:'m1',name:'Smart Air Monitor', price:7999, image:'assets/img/office_purifier.png', variant:'Standard', rating:'4.7' },
];

function renderWishlistPage() {
  const grid = document.getElementById('wishlist-grid');
  const ids = VERVAProd.getWishlist();
  if (!ids.length) return;
  const products = ids.map(id => CATALOG.find(p => p.id === id)).filter(Boolean);
  grid.innerHTML = products.map(p => `
    <div class="product-card anim-fade">
      <div class="product-card-img">
        <img src="${p.image}" alt="${p.name}" loading="lazy" />
        <div class="product-card-overlay">
          <button class="btn btn-primary btn-sm" data-add-cart
            data-id="${p.id}" data-name="${p.name}" data-price="${p.price}"
            data-image="${p.image}" data-variant="${p.variant}">
            <i class="fas fa-bag-shopping"></i> Add to Cart
          </button>
        </div>
      </div>
      <div class="product-card-body">
        <div class="product-card-meta">
          <div class="product-card-name">${p.name}</div>
          <button class="hdr-icon" style="width:32px;height:32px;font-size:.85rem;color:var(--cta);"
            data-wishlist="${p.id}" data-name="${p.name}">
            <i class="fas fa-heart"></i>
          </button>
        </div>
        <div class="product-card-meta">
          <div class="product-price">₹${p.price.toLocaleString('en-IN')}</div>
          <div class="product-stars"><i class="fas fa-star"></i> ${p.rating}</div>
        </div>
        <button class="btn btn-primary btn-block mt-3" data-add-cart
          data-id="${p.id}" data-name="${p.name}" data-price="${p.price}"
          data-image="${p.image}" data-variant="${p.variant}">
          Add to Cart
        </button>
      </div>
    </div>
  `).join('');
}
renderWishlistPage();
</script>
</body>
</html>
