version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: verva-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - verva-network

  redis:
    image: redis:7-alpine
    container_name: verva-redis
    ports:
      - "6379:6379"
    networks:
      - verva-network

  backend:
    build: ./backend
    container_name: verva-api
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/verva?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key
      FRONTEND_URL: http://localhost:5500
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis
    networks:
      - verva-network
    restart: unless-stopped

volumes:
  mongo_data:

networks:
  verva-network:
    driver: bridge
