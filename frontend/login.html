<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="VERVA Login – Sign in to your account." />
  <title>Login – VERVA</title>
  <link rel="stylesheet" href="node_modules/@fortawesome/fontawesome-free/css/all.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />
</head>
<body>

<div class="auth-page">
  <!-- Left visual -->
  <div class="auth-visual">
    <img src="assets/img/lifestyle_section.png" alt="VERVA lifestyle" />
    <div class="auth-visual-overlay">
      <div class="auth-visual-brand">VERVA.</div>
      <div class="auth-visual-word" aria-hidden="true">HELLO</div>
    </div>
  </div>

  <!-- Right form -->
  <div class="auth-form-side">
    <div class="auth-form-card">
      <a href="index.html" class="header-logo" style="margin-bottom:2rem;display:inline-flex;">VERVA<span class="dot">.</span></a>
      <h2>Welcome Back</h2>
      <p>Sign in to your account to continue.</p>

      <div class="social-auth mt-4" style="display:none;">
        <button class="social-auth-btn" id="google-login" disabled title="Google login coming soon">
          <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20H24v8h11.3C33.8 33.3 29.4 36 24 36a12 12 0 0 1 0-24c3.1 0 5.8 1.1 7.9 3L37.4 9.5A19.9 19.9 0 0 0 24 4 20 20 0 1 0 44 24c0-1.4-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8A12 12 0 0 1 24 12c3.1 0 5.8 1.1 7.9 3L37.4 9.5A19.9 19.9 0 0 0 6.3 14.7z"/><path fill="#4CAF50" d="M24 44a19.9 19.9 0 0 0 13.4-5.2l-6.2-5.3A12 12 0 0 1 24 36a11.9 11.9 0 0 1-11.3-8l-6.6 5.1A20 20 0 0 0 24 44z"/><path fill="#1976D2" d="M43.6 20H24v8h11.3A12 12 0 0 1 18.7 33l-6.6 5.1A20 20 0 0 0 44 24c0-1.4-.1-2.7-.4-4z"/></svg>
          Continue with Google
        </button>
      </div>
      
      <div class="divider">sign in with email</div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" placeholder="your@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div style="position:relative;">
            <input class="form-input" type="password" id="login-password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" id="toggle-pw" style="position:absolute;right:.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.9rem;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="flex" style="justify-content:space-between;margin-bottom:1.5rem;">
          <label style="display:flex;align-items:center;gap:.4rem;font-size:var(--fs-sm);cursor:pointer;">
            <input type="checkbox" /> Remember me
          </label>
          <a href="#" style="font-size:var(--fs-sm);color:var(--cta);">Forgot password?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
      </form>

      <p style="text-align:center;margin-top:1.5rem;font-size:var(--fs-sm);color:var(--text-muted);">
        Don't have an account? <a href="signup.html" style="color:var(--cta);font-weight:600;">Create one</a>
      </p>
      <p style="text-align:center;margin-top:.75rem;font-size:var(--fs-xs);color:var(--text-light);">
        <i class="fas fa-lock"></i> Secure login, encrypted by TLS 1.3
      </p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script src="js/connection-tester.js"></script>
<script>
  document.getElementById('toggle-pw')?.addEventListener('click', function() {
    const inp = document.getElementById('login-password');
    const isPass = inp.type === 'password';
    inp.type = isPass ? 'text' : 'password';
    this.querySelector('i').className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
  });
  document.getElementById('google-login')?.addEventListener('click', () => {
    showToast('Google login coming soon!');
  });
  
  // Help text for debugging
  console.log('%c💡 Tip: Open Console (F12) and type: runFullTest() to test API connection', 'color:#1abc9c;font-weight:bold;font-size:12px;');
</script>
</body>
</html>
